 raid_type_SOV_transport_volunteers_to_CZE: "Air Bridge for Soviet Volunteers"
 raid_type_SOV_transport_volunteers_to_CZE_desc: "Czechoslovakia has requested military aid, but our lack of direct borders complicates logistics, instead, we could assemble a force of volunteers that will be transported by air to fight as part of the Czechoslovak army."
 raid_target_name_CZE_volunteer_transport: "Mukaĉevo Airport"
 raid_type_INS_militia_increase_activity_raid: "Attempt Guerilla Infiltration"
 raid_type_INS_militia_increase_activity_raid_desc: "We will send Militias to the state, where they will make contact with local revolutionaries and establish guerilla cells. If the operation goes smoothly, we will attempt to infiltrate the region and seize control from the Dutch.\n\n§WThe target state must be in range of a Republican-owned §YBunker§!, §YRailway§!, or §YNaval Base§!. These buildings can be used as starting points.§!\n\n§YEffects:§!\n§RAssigned division is expended§!\n§YSuccess:§!\n       §WBecomes owner and controller of the state\n       Increases escalation by §R1§!§!.\n§YLimited Success:§!\n       §W Adds §Yone tier§! of militia activity, increasing success chance for future attempts.§!\n§YFailure:§!\n       §WNo effects§!."
 raid_type_INS_militia_port_raid: "Occupy Naval Base"
 raid_type_INS_militia_port_raid_desc: "We will send militias disguised as fisherman on small boats that will hopefully not be located. They will attempt to establish guerilla cells upon landing, and will work with local guerillas to occupy the naval base if opportunity allows. This is a very risky endeavour, if the militias get spotted, the operation is sure to fail.\n\n§YEffects:§!\n§RAssigned division is expended§!\n§YSuccess:§!\n       §WBecomes owner and controller of the state\n       Increases escalation by §R1§!§!.\n§YLimited Success:§!\n       §W Adds §Yone tier§! of militia activity, increasing success chance for future attempts.§!\n§YFailure:§!\n       §WNo effects§!."
 SIA_pacific_island_raid: "Raid Pacific Island"
 SIA_pacific_island_raid_desc: "We will raid the pacific island and attempt to severely damage their naval buildings, ships and armies on it."

