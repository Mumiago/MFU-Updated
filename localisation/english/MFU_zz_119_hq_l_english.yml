 raid_type_CHI_tokyo_imperial_palace_bombing: "Tokyo Imperial Palace Bombing"
 raid_type_CHI_tokyo_imperial_palace_bombing_desc: "By sending a group of bombers to attack the enemy's main headquarters, and the symbolic place of Japan's imperial power, we can boost our people's morale, while inflicting a blow to our enemy's morale at the same time."
 raid_type_CHI_national_diet_bombing: "National Diet Bombing"
 raid_type_CHI_national_diet_bombing_desc: "By sending a group of bombers to attack the enemy's main headquarters, and the symbolic place of Japan's power, we can boost our people's morale, while inflicting a blow to our enemy's morale at the same time."
 raid_type_CHI_hakko_ichiu_bombing: "Hakko Ichiu Bombing"
 raid_type_CHI_hakko_ichiu_bombing_desc: "By sending a group of bombers to attack the enemy's symbol of imperialism, we will show Japan's weakness, while we boost our own people's morale."
 raid_type_CHI_great_wall_raid_land: "Great Wall Infiltration Raid"
 raid_type_CHI_great_wall_raid_land_desc: "The wall does not hold the same defensive value it did in the past, but can still give an entrenched enemy the upper hand. By sending in a small groups of soldiers, we can infiltrate enemy lines and detonate well-placed charges to negate their advantage."
 raid_type_JAP_pearl_harbor_strike: "Pearl Harbor Strike"
 raid_type_JAP_pearl_harbor_strike_desc: "By sending a group of bombers to attack the enemy's main naval headquarter and fleet in the Pacific Ocean, we can boost our people's morale, while inflicting a blow to our enemy's morale and naval capabilities at the same time. Through this, our navies will be able to roam freely for 6 months!"
